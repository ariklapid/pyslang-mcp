services:
  pyslang-mcp:
    build:
      context: ../..
      dockerfile: Dockerfile
    image: pyslang-mcp:internal
    restart: unless-stopped
    environment:
      PYSLANG_MCP_HTTP_BEARER_TOKEN: ${PYSLANG_MCP_HTTP_BEARER_TOKEN:?Set this in deploy/internal/.env}
    ports:
      - "127.0.0.1:${PYSLANG_MCP_HTTP_PORT:-8000}:8000"
    volumes:
      - type: bind
        source: ${PYSLANG_MCP_WORKSPACE:?Set this in deploy/internal/.env}
        target: /workspace
        read_only: true
    read_only: true
    tmpfs:
      - /tmp
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    healthcheck:
      test:
        [
          "CMD",
          "python",
          "-c",
          "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8000/healthz', timeout=2).read()",
        ]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 20s
