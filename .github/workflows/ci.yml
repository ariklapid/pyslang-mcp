name: CI

on:
  pull_request:
  push:
    branches:
      - main

jobs:
  test:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            python-version: "3.11"
          - os: ubuntu-latest
            python-version: "3.12"
          - os: macos-14
            python-version: "3.12"
    runs-on: ${{ matrix.os }}

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install package and dev dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e '.[dev]'

      - name: Check formatting
        run: ruff format --check src tests

      - name: Lint
        run: ruff check src tests

      - name: Type check
        run: pyright

      - name: Run tests
        run: pytest --cov=src/pyslang_mcp --cov-report=xml --cov-report=term-missing:skip-covered -q

  hdl-smoke:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install Verilator
        run: |
          sudo apt-get update
          sudo apt-get install -y verilator

      - name: Install package and dev dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e '.[dev]'

      - name: Run HDL smoke validation
        run: pytest -q tests/test_hdl_smoke.py

  mcp-protocol-smoke:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install package and dev dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e '.[dev]'

      - name: Run MCP stdio protocol smoke
        run: pytest -q tests/test_mcp_stdio.py

  package-smoke:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Build wheel and sdist
        run: |
          python -m pip install --upgrade pip build
          python -m build --wheel --sdist

      - name: Install wheel in fresh virtual environment
        run: |
          python -m venv /tmp/pyslang-mcp-wheel-smoke
          /tmp/pyslang-mcp-wheel-smoke/bin/pip install --upgrade pip
          /tmp/pyslang-mcp-wheel-smoke/bin/pip install --pre --no-cache-dir dist/*.whl

      - name: Check installed console script help
        run: /tmp/pyslang-mcp-wheel-smoke/bin/pyslang-mcp --help

      - name: Run installed MCP stdio smoke
        run: |
          /tmp/pyslang-mcp-wheel-smoke/bin/python scripts/package_smoke_stdio.py \
            /tmp/pyslang-mcp-wheel-smoke/bin/pyslang-mcp \
            --project-root "$PWD/tests/fixtures/multi_file"

  internal-maas-docker-smoke:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Check Docker tools
        run: |
          docker --version
          docker compose version

      - name: Validate internal MaaS compose config
        env:
          PYSLANG_MCP_WORKSPACE: ${{ github.workspace }}/tests/fixtures/multi_file
          PYSLANG_MCP_HTTP_PORT: "18000"
          PYSLANG_MCP_HTTP_BEARER_TOKEN: ci-token
        run: docker compose -f deploy/internal/docker-compose.yml config

      - name: Build and start internal MaaS container
        env:
          PYSLANG_MCP_WORKSPACE: ${{ github.workspace }}/tests/fixtures/multi_file
          PYSLANG_MCP_HTTP_PORT: "18000"
          PYSLANG_MCP_HTTP_BEARER_TOKEN: ci-token
        run: |
          docker compose -f deploy/internal/docker-compose.yml up -d --build

      - name: Check internal MaaS health endpoint
        env:
          PYSLANG_MCP_WORKSPACE: ${{ github.workspace }}/tests/fixtures/multi_file
          PYSLANG_MCP_HTTP_PORT: "18000"
          PYSLANG_MCP_HTTP_BEARER_TOKEN: ci-token
        run: |
          for _ in {1..60}; do
            if python -c 'import json, urllib.request; body = json.loads(urllib.request.urlopen("http://127.0.0.1:18000/healthz", timeout=2).read()); assert body == {"status": "ok", "server": "pyslang-mcp"}, body'; then
              exit 0
            fi
            sleep 2
          done

          docker compose -f deploy/internal/docker-compose.yml ps
          docker compose -f deploy/internal/docker-compose.yml logs
          exit 1

      - name: Stop internal MaaS container
        if: always()
        env:
          PYSLANG_MCP_WORKSPACE: ${{ github.workspace }}/tests/fixtures/multi_file
          PYSLANG_MCP_HTTP_PORT: "18000"
          PYSLANG_MCP_HTTP_BEARER_TOKEN: ci-token
        run: docker compose -f deploy/internal/docker-compose.yml down --volumes
